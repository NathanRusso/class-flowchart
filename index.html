<body>
    <h1 class="center"> Computer Science BS/MS 2025-2026 Flowchart</h1>
    <button id="uploadTemplateButton" type="button" onclick="uploadTemplate()">Upload Template</button>
    <button id="downloadTemplateButton" type="button" onclick="downloadTemplate()">Save Template</button>
    <button id="pushYearButton" type="button" onclick="pushYear()">Add Year</button>
    <button id="popYearButton" type="button" onclick="popYear()">Remove Year</button>
    <button id="showTransferButton" type="button" onclick="showTransferSection()">Add Transfer</button>
    <button id="hideTransferButton" type="button" onclick="hideTransferSection()"" style="display: none;">Remove Transfer</button>
    <button id="addClassButton" type="button" onclick="addClass()">Add Class</button>

    <div id="year-0" class="year" style="display: none; margin-top: 5px;">
        <div id="year-text-0" class="year-text"> Transfer </div>
        <div id="year-block-0" class="year-block">
            <div id="transfer" class="transfer"> </div>
        </div>
    </div>
    <div id="year-divider-1" class="year-divider" style="display: none;"></div>
