<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flowchart</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
    <h1 class="center"> Computer Science BS/MS Flowchart</h1>
    <button type="button" onclick="addYear()">Add Year!</button>
    <button type="button" onclick="removeYear()">Remove Year!</button>

    <div id="year-1">
        <div id="fall-1" class="semester" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)">
            <div id="c1" class="class" draggable="true" ondragstart="dragstartHandler(event)" style="border-color: orange;">
                Class 1
            </div>
            <div id="c2" class="class" draggable="true" ondragstart="dragstartHandler(event)" style="border-color: blue;">
                Class 2
            </div>
            <div id="c3" class="class" draggable="true" ondragstart="dragstartHandler(event)" style="border-color: green;">
                Class 3
            </div>
            <div id="c4" class="class" draggable="true" ondragstart="dragstartHandler(event)" style="border-color: green;">
                Class 4
            </div>
            <div id="c5" class="class" draggable="true" ondragstart="dragstartHandler(event)" style="border-color: green;">
                Class 5
            </div>
            <div id="c6" class="class" draggable="true" ondragstart="dragstartHandler(event)" style="border-color: red;">
                Class 6
            </div>
        </div>
        <div id="spring-1" class="semester" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)">
            <div id="co1" class="coop" draggable="true" ondragstart="dragstartHandler(event)">Co-op</div>
        </div>
        <div id="summer-1" class="semester" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)"></div>
    </div>



    <script src="/js/add.js"></script>
    <script src="/js/dragdrop.js"></script>
</body>
</html>
